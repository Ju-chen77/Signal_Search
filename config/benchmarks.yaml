      能源: "HSMOGI"
      # 以下行业没有专门指数，回退到恒生指数
      消费: "HSI"
      医药: "HSI"
      金融: "HSI"
      公用事业: "HSI"
      电信: "HSI"
      工业: "HSI"
      综合企业: "HSI"
      汽车: "HSI"
      博彩: "HSI"


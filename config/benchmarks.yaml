markets:
  us:
    name: "US Stock Market"
    has_price_limit: false
    initial_threshold_pct: 5.0        # 初筛阈值：日收益率绝对值 > 5% 才进入"大波动"池
    percentile: 99                     # 取每家公司日收益率的第99百分位以上作为"显著波动"
    benchmarks:
      - ticker: "AAPL"
        name: "Apple"
        controversy: "电脑公司→消费电子→服务平台"
      - ticker: "AMZN"
        name: "Amazon"
        controversy: "网上书店→万物商店→云计算"
      - ticker: "TSLA"
        name: "Tesla"
        controversy: "汽车→科技→能源→AI机器人"
      - ticker: "NFLX"
        name: "Netflix"
        controversy: "DVD→流媒体→内容制作"
      - ticker: "NVDA"
        name: "Nvidia"
        controversy: "游戏显卡→AI基础设施"
      - ticker: "META"
        name: "Meta"
        controversy: "社交→元宇宙→AI"
    scan_universe: "sp500"
    lookback_years: 5

  hk:
    name: "Hong Kong Stock Market"
    has_price_limit: false
    initial_threshold_pct: 5.0
    percentile: 99
